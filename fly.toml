# ForgeSight backend on Fly.io. Deploy: fly deploy (after `fly auth login` + Postgres attach).
# See docs/DEPLOY.md for the full sequence (Postgres create/attach + secrets + migrations).
app = "forge-sight-api"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"
  # On Fly there is no local Ollama: synthesize via the hosted API, retrieve via full-text.
  SYNTHESIS_BACKEND = "hosted"
  LLM_PROVIDER = "openai"
  LLM_MODEL = "gpt-4o-mini"
  RETRIEVAL_MODE = "fulltext"
  MODEL_BACKEND = "slm_only"
  DEMO_MODE = "true"
  ALLOWED_ORIGINS = "https://forge-sight-one.vercel.app,http://localhost:3000,http://127.0.0.1:3000"
  # Secrets (set via `fly secrets set`): DATABASE_URL (from `fly postgres attach`), LLM_API_KEY.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
